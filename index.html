<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PREV A LO NICA</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
background:linear-gradient(135deg,#ff5e3a,#ff9966);
color:white;
}

.container{
max-width:700px;
margin:auto;
padding:40px;
}

h1{
font-size:45px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
background:white;
color:#ff5e3a;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.health{
font-size:22px;
margin:20px;
}

.score{
font-size:20px;
}

.motivation{
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<div id="inicio">

<h1>🍉🍋 PREV A LO NICA</h1>

<p>
Una bebida creada para promover decisiones saludables
y prevenir la adicción al alcohol.
</p>

<button onclick="startGame()">Iniciar experiencia</button>

<br><br>

<button onclick="sandia()">Tema Sandía</button>
<button onclick="limon()">Tema Limón</button>

</div>

<div id="game" class="hidden">

<h2 id="pregunta"></h2>

<div id="opciones"></div>

<div class="health">
❤️ Salud: <span id="health">3</span>
</div>

<div class="score">
⭐ Decisiones correctas: <span id="score">0</span>
</div>

</div>

<div id="final" class="hidden">

<h1>Resultado final</h1>

<p id="mensajeFinal"></p>

<div class="motivation">

✨ Tu futuro vale más que un momento  
<br><br>
✨ Ser fuerte es saber decir NO  
<br><br>
✨ Cada decisión construye tu futuro  

</div>

<button onclick="reiniciar()">Jugar otra vez</button>

</div>

</div>

<script>

let salud=3
let puntos=0
let paso=0

const preguntas=[

{
texto:"Estás en una fiesta y alguien te ofrece alcohol",
opciones:[
{texto:"Aceptar bebida",salud:-1,puntos:0},
{texto:"Elegir PREV A LO NICA",salud:0,puntos:1}
]
},

{
texto:"Tus amigos insisten en que bebas más",
opciones:[
{texto:"Ceder a la presión",salud:-1,puntos:0},
{texto:"Mantener tu decisión",salud:0,puntos:1}
]
},

{
texto:"Debes conducir después de la fiesta",
opciones:[
{texto:"Conducir después de beber",salud:-1,puntos:0},
{texto:"Buscar transporte seguro",salud:0,puntos:1}
]
}

]

function startGame(){

document.getElementById("inicio").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

cargarPregunta()

}

function cargarPregunta(){

if(paso>=preguntas.length || salud<=0){
finalJuego()
return
}

let p=preguntas[paso]

document.getElementById("pregunta").innerText=p.texto

let html=""

p.opciones.forEach(o=>{

html+=`<button onclick="elegir(${o.salud},${o.puntos})">${o.texto}</button>`

})

document.getElementById("opciones").innerHTML=html

document.getElementById("health").innerText=salud
document.getElementById("score").innerText=puntos

}

function elegir(cambioSalud,cambioPuntos){

salud+=cambioSalud
puntos+=cambioPuntos

paso++

cargarPregunta()

}

function finalJuego(){

document.getElementById("game").classList.add("hidden")
document.getElementById("final").classList.remove("hidden")

if(puntos>=2){

document.getElementById("mensajeFinal").innerText=
"🎉 Excelente. Tomaste decisiones saludables y protegiste tu futuro."

}else{

document.getElementById("mensajeFinal").innerText=
"⚠️ Algunas decisiones pueden mejorar. Siempre puedes elegir un camino más saludable."

}

}

function reiniciar(){
location.reload()
}

function sandia(){
document.body.style.background="linear-gradient(135deg,#ff4d4d,#ff8080)"
}

function limon(){
document.body.style.background="linear-gradient(135deg,#3ccf7a,#8affc1)"
}

</script>

</body>
</html>
