<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PREVE A LO NICA</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#ff6a3d,#ff9966);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:92%;
max-width:520px;
text-align:center;
}

.card{
background:white;
color:#333;
padding:35px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fade 0.5s;
}

h1{
margin-top:0;
}

button{
background:#ff5e3a;
color:white;
border:none;
padding:14px 24px;
margin:8px;
border-radius:30px;
font-size:17px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

.hidden{
display:none;
}

.progress{
height:12px;
background:#ddd;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
width:0%;
transition:0.3s;
}

.health{
margin-top:10px;
font-size:18px;
}

.score{
font-size:18px;
}

.timer{
font-size:18px;
margin-top:10px;
}

.final{
font-size:20px;
margin-top:20px;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<div class="card" id="inicio">

<h1>🍉🍋 PREVE A LO NICA</h1>

<p>
Una bebida creada para promover decisiones saludables
y prevenir la adicción al alcohol.
</p>

<button onclick="startGame()">Iniciar experiencia</button>

<br>

<button onclick="sandia()">🍉 Tema Sandía</button>
<button onclick="limon()">🍋 Tema Limón</button>

</div>


<div class="card hidden" id="game">

<h2 id="pregunta"></h2>

<div id="opciones"></div>

<div class="timer">
⏱ Tiempo: <span id="time">10</span>
</div>

<div class="progress">
<div class="bar" id="barra"></div>
</div>

<div class="health">
❤️ Salud: <span id="health">3</span>
</div>

<div class="score">
⭐ Puntos: <span id="score">0</span>
</div>

</div>


<div class="card hidden" id="final">

<h2>🏆 Resultado final</h2>

<p class="final" id="mensaje"></p>

<p>

✨ Tu futuro vale más que un momento  
<br><br>
✨ La verdadera fuerza es saber decir NO  
<br><br>
✨ Cada decisión construye tu futuro  

</p>

<button onclick="reiniciar()">Jugar otra vez</button>

</div>

</div>

<script>

let preguntas=[

{
texto:"Estás en una fiesta y te ofrecen alcohol",
opciones:[
{text:"Aceptar bebida",salud:-1,puntos:0},
{text:"Elegir PREV A LO NICA",salud:0,puntos:1}
]
},

{
texto:"Tus amigos te presionan para beber más",
opciones:[
{text:"Ceder a la presión",salud:-1,puntos:0},
{text:"Mantener tu decisión",salud:0,puntos:1}
]
},

{
texto:"Debes conducir después de la fiesta",
opciones:[
{text:"Conducir igual",salud:-1,puntos:0},
{text:"Buscar transporte seguro",salud:0,puntos:1}
]
},

{
texto:"Te sientes tentado a beber nuevamente",
opciones:[
{text:"Beber otra vez",salud:-1,puntos:0},
{text:"Elegir alternativa saludable",salud:0,puntos:1}
]
}

]

let paso=0
let puntos=0
let salud=3
let tiempo=10
let intervalo

function startGame(){

document.getElementById("inicio").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

cargar()

}

function cargar(){

clearInterval(intervalo)

if(paso>=preguntas.length || salud<=0){

final()

return

}

let p=preguntas[paso]

document.getElementById("pregunta").innerText=p.texto

let html=""

p.opciones.forEach(o=>{

html+=`<button onclick="elegir(${o.salud},${o.puntos})">${o.text}</button>`

})

document.getElementById("opciones").innerHTML=html

document.getElementById("score").innerText=puntos
document.getElementById("health").innerText=salud

document.getElementById("barra").style.width=(paso/preguntas.length*100)+"%"

tiempo=10

document.getElementById("time").innerText=tiempo

intervalo=setInterval(()=>{

tiempo--

document.getElementById("time").innerText=tiempo

if(tiempo==0){

salud--

paso++

cargar()

}

},1000)

}

function elegir(s,p){

clearInterval(intervalo)

salud+=s
puntos+=p

paso++

cargar()

}

function final(){

document.getElementById("game").classList.add("hidden")
document.getElementById("final").classList.remove("hidden")

if(puntos>=3){

document.getElementById("mensaje").innerText=
"🎉 Excelente. Demostraste control y tomaste decisiones saludables."

}else{

document.getElementById("mensaje").innerText=
"⚠️ Siempre puedes mejorar tus decisiones. Tu salud es lo más importante."

}

}

function reiniciar(){

location.reload()

}

function sandia(){

document.body.style.background="linear-gradient(135deg,#ff4d4d,#ff8080)"

}

function limon(){

document.body.style.background="linear-gradient(135deg,#3ccf7a,#8affc1)"

}

</script>

</body>
</html>
